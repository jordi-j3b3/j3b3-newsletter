name: Newsletter automatitzada

on:
  schedule:
    # Dos intents el diumenge, fora de l'hora rodona (GitHub retarda/descarta els :00).
    # Amb la idempotència de schedule.py, el segon intent és inofensiu (no-op si el primer va bé).
    - cron: '23 16 * * 0'   # diumenge 18:23 CEST (16:23 UTC) — intent principal, amb marge
    - cron: '23 19 * * 0'   # diumenge 21:23 CEST (19:23 UTC) — intent de seguretat
  workflow_dispatch:
    inputs:
      replace:
        description: "Regenerar: substituir la campanya ja programada d'aquesta setmana"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  schedule-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout j3b3-newsletter
        uses: actions/checkout@v4

      - name: Clone observatori-comerc (lectura de dades + escriptura del mirall)
        run: |
          git clone "https://x-access-token:${{ secrets.OBSERVATORI_PUSH_TOKEN }}@github.com/jordi-j3b3/observatori-comerc.git" /tmp/observatori-comerc
          git -C /tmp/observatori-comerc config user.name 'github-actions[bot]'
          git -C /tmp/observatori-comerc config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run schedule.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_PREVIEW_ID: ${{ secrets.BREVO_LIST_PREVIEW_ID }}
          BREVO_LIST_PILOT_ID: ${{ secrets.BREVO_LIST_PILOT_ID }}
          BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
          BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
          OBSERVATORI_PATH: /tmp/observatori-comerc
          MIRROR_ON_SCHEDULE: '1'
        run: python scripts/schedule.py ${{ github.event.inputs.replace == 'true' && '--replace' || '' }}

      - name: Commit historial i web actualitzats
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add config/historial_editorial.json docs/
          if git diff --staged --quiet; then
            echo "Sense canvis."
          else
            git commit -m "auto: programada nova edició setmanal + web publicada"
            git pull --rebase
            git push
          fi

