name: Newsletter automatitzada

on:
  schedule:
    - cron: '0 20 * * 0'   # Cada diumenge 22:00 CEST (20:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  schedule-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout j3b3-newsletter
        uses: actions/checkout@v4

      - name: Clone observatori-comerc (lectura de dades + escriptura del mirall)
        run: |
          git clone "https://x-access-token:${{ secrets.OBSERVATORI_PUSH_TOKEN }}@github.com/jordi-j3b3/observatori-comerc.git" /tmp/observatori-comerc
          git -C /tmp/observatori-comerc config user.name 'github-actions[bot]'
          git -C /tmp/observatori-comerc config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run schedule.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_PREVIEW_ID: ${{ secrets.BREVO_LIST_PREVIEW_ID }}
          BREVO_LIST_PILOT_ID: ${{ secrets.BREVO_LIST_PILOT_ID }}
          BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
          BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
          OBSERVATORI_PATH: /tmp/observatori-comerc
          MIRROR_ON_SCHEDULE: '1'
        run: python scripts/schedule.py

      - name: Commit historial i web actualitzats
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add config/historial_editorial.json web/
          if git diff --staged --quiet; then
            echo "Sense canvis."
          else
            git commit -m "auto: programada nova edició setmanal + web publicada"
            git pull --rebase
            git push
          fi

      - name: Deploy web/ a Hostinet via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.HOSTINET_FTP_HOST }}
          username: ${{ secrets.HOSTINET_FTP_USER }}
          password: ${{ secrets.HOSTINET_FTP_PASS }}
          local-dir: ./web/
          # A Hostinet l'usuari FTP del domini sol apuntar directament a public_html/.
          # Si cal ajustar (arrel = home i no public_html), canvia './' per './public_html/'.
          server-dir: ./
          protocol: ftp
          exclude: |
            **/.git*
            **/README*
            **/manifest.json
